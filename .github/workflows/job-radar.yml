name: Job Radar

# Refresh the fit-scored shortlist daily on the free, autonomous Tier-1 path (fetch public ATS
# boards → pre-filter → deterministic score). No secrets, no paid API. Tier-2 (`/radar-score`) is a
# separate, on-command Claude Code pass Ryan runs locally.
on:
  schedule:
    - cron: '27 13 * * *' # daily ~13:27 UTC
  workflow_dispatch:

# Push the refreshed JSON back to main, and dispatch the deploy so the page republishes.
permissions:
  contents: write
  actions: write

concurrency:
  group: job-radar
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh shortlist (Tier-1, free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Job Radar (fetch → pre-filter → Tier-1 score)
        run: npm run radar

      - name: Commit refreshed data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/job-radar/latest.json data/job-radar/candidates.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(job-radar): refresh shortlist"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN does not itself trigger the deploy workflow, so dispatch it
      # explicitly (only when the data actually changed) to republish the page.
      - name: Publish refreshed page
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml
